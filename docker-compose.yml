services:
  node1:
    build: .
    container_name: chat_node1
    environment:
      NODE_ID: node1
      REPLICATION_MODE: strong
    command: >
      python src/chat_server.py
      --ws_port 9001
      --grpc_port 50051
      --seqnum 1
    ports:
      - "8001:8001"
      - "9001:9001"
      - "50051:50051"
    volumes:
      - ./data/node1:/app/data

  node2:
    build: .
    container_name: chat_node2
    environment:
      NODE_ID: node2
      REPLICATION_MODE: strong
    command: >
      python src/chat_server.py
      --ws_port 9002
      --grpc_port 50052
      --seqnum 2
    ports:
      - "8002:8002"
      - "9002:9002"
      - "50052:50052"
    volumes:
      - ./data/node2:/app/data

  node3:
    build: .
    container_name: chat_node3
    environment:
      NODE_ID: node3
      REPLICATION_MODE: strong
    command: >
      python src/chat_server.py
      --ws_port 9003
      --grpc_port 50053
      --seqnum 3
    ports:
      - "8003:8003"
      - "9003:9003"
      - "50053:50053"
    volumes:
      - ./data/node3:/app/data

  lb:
    build: .
    container_name: chat_lb
    environment:
      LB_NODES: "http://chat_node1:8001,http://chat_node2:8002,http://chat_node3:8003"
      LB_POLL_INTERVAL: "2"
    command: uvicorn src.load_balancer:app --host 0.0.0.0 --port 80 --loop asyncio --workers 1
    ports:
      - "8080:80"   
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/lb/health"]
      interval: 10s
      timeout: 3s
      retries: 3
